<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC Planner — Calendário de Conteúdo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:#30363d;--text:#c9d1d9;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--green:#3fb950;--yellow:#e3b341;--red:#f85149;--purple:#bc8cff;--orange:#f0883e;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden;height:100vh}
#sidebar{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#calendar-area{flex:1;overflow-y:auto;padding:20px}
#sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;color:var(--text2);letter-spacing:.05em;text-transform:uppercase}
#client-search{padding:8px 12px;border-bottom:1px solid var(--border)}
#client-search input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:13px;outline:none}
#client-search input:focus{border-color:var(--blue)}
#client-list{overflow-y:auto;flex:1}
.client-item{padding:8px 14px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:8px;transition:.15s}
.client-item:hover{background:var(--bg3)}
.client-item.active{background:var(--bg3);border-left-color:var(--blue)}
.client-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.client-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-ig{font-size:11px;color:var(--text3)}
#sidebar-footer{padding:10px 12px;border-top:1px solid var(--border)}
#btn-folder{width:100%;padding:7px;background:var(--bg3);border:1px dashed var(--border);color:var(--text2);border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
#btn-folder:hover{border-color:var(--blue);color:var(--blue)}
#folder-status{font-size:11px;color:var(--text3);margin-top:6px;text-align:center;word-break:break-all}
#topbar h2{font-size:15px;font-weight:600;flex:1}
.tb-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:13px;transition:.15s}
.tb-btn:hover{border-color:var(--blue);color:var(--blue)}
#month-nav{display:flex;align-items:center;gap:8px}
#month-label{font-size:14px;font-weight:600;min-width:130px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;min-height:90px;cursor:pointer;transition:.15s;position:relative}
.cal-day:hover{border-color:var(--blue);background:var(--bg3)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-day.today{border-color:var(--yellow)}
.cal-day.has-post{border-left:3px solid var(--blue)}
.cal-day.has-files::after{content:'📁';position:absolute;top:6px;right:6px;font-size:11px}
.cal-day-num{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px}
.cal-day-title{font-size:11px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cal-day-tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-top:4px;margin-right:2px}
.cal-day-tag.post{background:#1f2d44;color:var(--blue)}
.cal-day-tag.story{background:#1f2d2f;color:var(--green)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;padding:20px;overflow-y:auto}
#modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
#modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:800px}
#modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#modal-header h3{font-size:16px;font-weight:700}
#modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
#modal-close:hover{color:var(--text)}
#modal-tabs{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid var(--border)}
.modal-tab{padding:10px 14px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;border-bottom:2px solid transparent;transition:.15s}
.modal-tab:hover{color:var(--text)}
.modal-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-panel{display:none;padding:20px}
.tab-panel.active{display:block}
.post-section{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.post-section label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.post-section .val{font-size:13px;line-height:1.6;color:var(--text)}
.post-section textarea{width:100%;background:var(--bg4);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px;font-size:13px;resize:vertical;font-family:inherit;outline:none;min-height:80px}
.post-section textarea:focus{border-color:var(--blue)}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--bg4);border:1px solid var(--border);color:var(--text2);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer}
.copy-btn:hover{color:var(--blue);border-color:var(--blue)}
#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.gallery-item{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);cursor:pointer;position:relative}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.gal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;gap:6px;opacity:0;transition:.2s}
.gallery-item:hover .gal-overlay{opacity:1}
.gal-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 7px;font-size:11px;cursor:pointer}
.gal-btn:hover{background:var(--blue);color:#000;border-color:var(--blue)}
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:12px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--blue);background:rgba(88,166,255,.05)}
.upload-zone p{color:var(--text2);font-size:13px;margin-bottom:4px}
.upload-zone small{color:var(--text3);font-size:11px}
.dl-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 11px;font-size:12px;cursor:pointer;transition:.15s}
.dl-btn:hover{border-color:var(--green);color:var(--green)}
.dl-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.no-files{color:var(--text3);font-size:13px;padding:8px 0}
.video-wrap{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:12px}
.video-wrap video{width:100%;border-radius:6px;max-height:280px;margin-top:8px}
.sec-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.prompt-box{background:#0d1117;border:1px solid var(--purple);border-radius:8px;padding:14px;margin-top:16px}
.prompt-box-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.prompt-box-title{font-size:12px;font-weight:700;color:var(--purple);letter-spacing:.05em;text-transform:uppercase}
.prompt-copy-btn{background:var(--purple);border:none;color:#000;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.prompt-copy-btn:hover{background:#d4a9ff}
.prompt-copy-btn.copied{background:var(--green);color:#000}
.prompt-ta{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:10px;font-size:11px;font-family:monospace;resize:vertical;min-height:160px;max-height:260px;outline:none;line-height:1.5}
.prompt-ta:focus{border-color:var(--purple)}
#client-view{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;padding:24px}
#client-view.open{display:block}
#cv-header{max-width:760px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between}
.cv-card{max-width:760px;margin:0 auto 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.cv-date{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.cv-title{font-size:16px;font-weight:700;margin-bottom:3px}
.cv-sub{font-size:13px;color:var(--text2);margin-bottom:8px}
.cv-cap{font-size:13px;line-height:1.6;color:var(--text2);margin-bottom:8px;white-space:pre-wrap}
.cv-story{background:var(--bg3);border-radius:6px;padding:8px;font-size:12px;color:var(--purple);margin-bottom:6px}
.cv-ht{font-size:11px;color:var(--text3)}
.cv-imgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.cv-imgs img{height:80px;border-radius:6px;object-fit:cover;cursor:pointer}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px}
#lb-close{position:fixed;top:14px;right:18px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;z-index:301}
.badge{background:var(--bg4);color:var(--text2);border-radius:4px;padding:2px 7px;font-size:11px;margin-left:6px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div id="app">
<div id="sidebar">
  <div id="sidebar-header">TC Planner <span class="badge" id="client-count">0</span></div>
  <div id="client-search"><input id="search-input" placeholder="Buscar cliente..." oninput="filterClients()"></div>
  <div id="client-list"></div>
  <div id="sidebar-footer">
    <button id="btn-folder" onclick="pickRootFolder()">📂 Selecionar pasta raiz</button>
    <div id="folder-status">Nenhuma pasta conectada</div>
  </div>
</div>
<div id="main">
  <div id="topbar">
    <h2 id="topbar-title">Selecione um cliente</h2>
    <div id="month-nav" style="display:none">
      <button class="tb-btn" onclick="changeMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button class="tb-btn" onclick="changeMonth(1)">›</button>
    </div>
    <button class="tb-btn" id="btn-cv" onclick="openClientView()" style="display:none">👁 Visão do cliente</button>
    <button class="tb-btn" id="btn-refresh" onclick="refreshFolders()" style="display:none" title="Recarregar arquivos">↺</button>
  </div>
  <div id="calendar-area">
    <div id="calendar">
      <div style="text-align:center;padding:60px 20px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:16px">📅</div>
        <div style="font-size:15px">Selecione um cliente na barra lateral</div>
        <div style="font-size:12px;margin-top:8px">Conecte sua pasta raiz para salvar e acessar arquivos do disco</div>
      </div>
    </div>
  </div>
</div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div id="modal-header">
      <h3 id="modal-title"></h3>
      <button id="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('content')">📝 Conteúdo</button>
      <button class="modal-tab" onclick="switchTab('files')">📁 Arquivos</button>
    </div>
    <div id="tab-content" class="tab-panel active"><div id="post-content"></div></div>
    <div id="tab-files" class="tab-panel"><div id="files-content"></div></div>
  </div>
</div>

<div id="client-view">
  <div id="cv-header">
    <div>
      <div style="font-size:20px;font-weight:700" id="cv-name"></div>
      <div style="font-size:13px;color:var(--text3);margin-top:2px" id="cv-ig"></div>
    </div>
    <button class="tb-btn" onclick="closeClientView()">✕ Fechar</button>
  </div>
  <div id="cv-cards"></div>
</div>

<div id="lightbox" onclick="if(event.target===this||event.target.id==='lightbox')closeLightbox()">
  <button id="lb-close" onclick="closeLightbox()">×</button>
  <img id="lb-img" src="" alt="">
</div>

// ── State ──
let currentClient=null,currentYear=2026,currentMonth=3;
let rootDirHandle=null,currentDayData=null;
const FILES_CACHE={};

// ── IndexedDB ──
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('tcp3',1);q.onupgradeneeded=e=>e.target.result.createObjectStore('h',{keyPath:'k'});q.onsuccess=e=>r(e.target.result);q.onerror=j});}
async function saveHandle(h){const db=await openDB();const tx=db.transaction('h','readwrite');tx.objectStore('h').put({k:'root',h});return new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=j});}
async function loadHandle(){const db=await openDB();const tx=db.transaction('h','readonly');const r=tx.objectStore('h').get('root');return new Promise((res,rej)=>{r.onsuccess=()=>res(r.result?.h);r.onerror=rej});}

// ── FS API ──
async function pickRootFolder(){
  if(!('showDirectoryPicker' in window)){alert('Use Chrome ou Edge para conectar a pasta de arquivos.');return;}
  try{const h=await window.showDirectoryPicker({mode:'readwrite'});rootDirHandle=h;await saveHandle(h);updateFolderStatus();if(currentClient)refreshFolders();}catch(e){if(e.name!=='AbortError')console.error(e);}
}
async function tryRestoreHandle(){
  try{const h=await loadHandle();if(!h)return;const p=await h.queryPermission({mode:'readwrite'});if(p==='granted'){rootDirHandle=h;updateFolderStatus();return;}const rq=await h.requestPermission({mode:'readwrite'});if(rq==='granted'){rootDirHandle=h;updateFolderStatus();}}catch(e){}
}
function updateFolderStatus(){
  const el=document.getElementById('folder-status'),rb=document.getElementById('btn-refresh');
  if(rootDirHandle){el.textContent='✓ '+rootDirHandle.name;el.style.color='var(--green)';if(rb)rb.style.display='';}
  else{el.textContent='Nenhuma pasta conectada';el.style.color='';if(rb)rb.style.display='none';}
}
async function getDirAt(path,create=false){
  let h=rootDirHandle;for(const s of path){try{h=await h.getDirectoryHandle(s,{create});}catch{return null;}}return h;
}
function dayFolder(ds){const d=new Date(ds+'T12:00:00'),dows=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];return`${dows[d.getDay()]}_${String(d.getDate()).padStart(2,'0')}`;}
function monthFolder(y,m){if(y===2026&&m===3)return'04_Abril_2026';const mn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];return`${String(m+1).padStart(2,'0')}_${mn[m]}_${y}`;}
async function readDayFiles(cid,ds){
  if(!rootDirHandle)return null;
  const dh=await getDirAt(['clientes',cid,monthFolder(currentYear,currentMonth),dayFolder(ds)]);
  const res={images:[],video:null,txt:null,folderHandle:dh};
  if(!dh)return res;
  try{for await(const[n,h]of dh.entries()){if(h.kind!=='file')continue;const lo=n.toLowerCase();const f=await h.getFile();
    if(/\.(jpg|jpeg|png|gif|webp)$/.test(lo))res.images.push({name:n,handle:h,url:URL.createObjectURL(f),file:f});
    else if(/\.(mp4|mov|webm|avi)$/.test(lo))res.video={name:n,handle:h,url:URL.createObjectURL(f),file:f};
    else if(/\.txt$/.test(lo))res.txt={name:n,handle:h,content:await f.text()};
  }}catch(e){console.error(e);}return res;
}
async function ensureDayFolder(cid,ds){const b=await getDirAt(['clientes',cid,monthFolder(currentYear,currentMonth)],true);if(!b)return null;return b.getDirectoryHandle(dayFolder(ds),{create:true});}
async function writeFile(dh,f){const fh=await dh.getFileHandle(f.name,{create:true});const w=await fh.createWritable();await w.write(f);await w.close();}
async function writeTxt(cid,ds,content){let dh=currentDayData?.folderHandle;if(!dh)dh=await ensureDayFolder(cid,ds);if(!dh)return;const fh=await dh.getFileHandle('descricao.txt',{create:true});const w=await fh.createWritable();await w.write(content);await w.close();}

// ── Calendar ──
function renderCalendar(){
  if(!currentClient)return;
  const y=currentYear,m=currentMonth,today=new Date();
  const fd=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const mn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('month-label').textContent=`${mn[m]} ${y}`;
  let h=`<div class="cal-grid"><div class="cal-dow">Dom</div><div class="cal-dow">Seg</div><div class="cal-dow">Ter</div><div class="cal-dow">Qua</div><div class="cal-dow">Qui</div><div class="cal-dow">Sex</div><div class="cal-dow">Sáb</div>`;
  for(let i=0;i<fd;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const post=currentClient.posts?.[ds],cache=FILES_CACHE[`${currentClient.id}-${ds}`];
    const hasF=cache?.images?.length>0||!!cache?.video;
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    let cls='cal-day';if(isT)cls+=' today';if(post)cls+=' has-post';if(hasF)cls+=' has-files';
    const df=dayFolder(ds);
    let inner=`<div class="cal-day-num">${d} <small style="color:var(--text3);font-size:9px">${df.split('_')[0]}</small></div>`;
    if(post){inner+=`<div class="cal-day-title" style="color:${currentClient.color}">${eh(post.title||'—')}</div>`;if(post.story)inner+=`<span class="cal-day-tag story">Story</span>`;inner+=`<span class="cal-day-tag post">Post</span>`;}
    h+=`<div class="${cls}" onclick="openDay('${ds}')">${inner}</div>`;
  }
  h+=`</div>`;
  document.getElementById('calendar').innerHTML=h;
}
async function refreshFolders(){
  if(!currentClient||!rootDirHandle)return;
  const rb=document.getElementById('btn-refresh');rb.innerHTML='<span class="spinner"></span>';
  const y=currentYear,m=currentMonth,days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const f=await readDayFiles(currentClient.id,ds);if(f)FILES_CACHE[`${currentClient.id}-${ds}`]=f;}
  renderCalendar();rb.textContent='↺';
}

// ── Modal ──
let currentDateStr=null;
async function openDay(ds){
  currentDateStr=ds;
  const d=new Date(ds+'T12:00:00');
  const dn=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'],mn=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('modal-title').textContent=`${dn[d.getDay()]}, ${d.getDate()} de ${mn[d.getMonth()]} ${d.getFullYear()}`;
  switchTab('content');renderPostContent(ds);
  let files=FILES_CACHE[`${currentClient.id}-${ds}`]||null;
  if(!files&&rootDirHandle){files=await readDayFiles(currentClient.id,ds);if(files)FILES_CACHE[`${currentClient.id}-${ds}`]=files;}
  currentDayData=files;renderFilesContent(ds,files);
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');currentDayData=null;}
function switchTab(tab){
  document.querySelectorAll('.modal-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='content')||(i===1&&tab==='files')));
  document.getElementById('tab-content').classList.toggle('active',tab==='content');
  document.getElementById('tab-files').classList.toggle('active',tab==='files');
}
function renderPostContent(ds){
  const post=currentClient?.posts?.[ds],el=document.getElementById('post-content');
  if(!post){el.innerHTML=`<div style="color:var(--text3);padding:20px;text-align:center">Nenhum post planejado para este dia.<br><small>Adicione arquivos na aba 📁 Arquivos.</small></div>`;return;}
  let h='';
  if(post.title)h+=sec('TÍTULO',post.title,true);
  if(post.subtitle)h+=sec('SUBTÍTULO',post.subtitle,true);
  if(post.cta)h+=sec('CTA',post.cta,true);
  if(post.caption)h+=secTa('LEGENDA',post.caption,'cap-'+ds);
  if(post.hashtags)h+=secTa('HASHTAGS',post.hashtags,'ht-'+ds);
  if(post.story)h+=sec('💡 STORY',post.story,true);
  // AI Prompt section
  const prompt=buildPrompt(post,currentClient);
  h+=`<div class="prompt-box">
    <div class="prompt-box-header">
      <span class="prompt-box-title">🤖 Prompt ChatGPT — Criar Arte</span>
      <button class="prompt-copy-btn" id="prompt-copy-btn" onclick="copyPrompt('prompt-ta-${ds}')">Copiar Prompt</button>
    </div>
    <textarea class="prompt-ta" id="prompt-ta-${ds}" readonly>${eh(prompt)}</textarea>
  </div>`;
  el.innerHTML=h||`<div style="color:var(--text3);padding:20px">Detalhes não disponíveis.</div>`;
}
function sec(lbl,val,cp=false){const cb=cp?`<button class="copy-btn" onclick="copyT('${ea(val)}')">Copiar</button>`:'';return`<div class="post-section">${cb}<label>${lbl}</label><div class="val">${eh(val)}</div></div>`;}
function secTa(lbl,val,id){return`<div class="post-section"><button class="copy-btn" onclick="copyTa('${id}')">Copiar</button><label>${lbl}</label><textarea id="${id}">${eh(val)}</textarea></div>`;}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}
function copyT(t){navigator.clipboard?.writeText(t);toast('Copiado!');}
function copyTa(id){const e=document.getElementById(id);if(e){navigator.clipboard?.writeText(e.value);toast('Copiado!');}}
function copyPrompt(id){
  const e=document.getElementById(id);if(!e)return;
  navigator.clipboard?.writeText(e.value);
  const btn=document.getElementById('prompt-copy-btn');
  if(btn){btn.textContent='✓ Copiado!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copiar Prompt';btn.classList.remove('copied');},2000);}
  toast('Prompt copiado! Cole no ChatGPT junto com a imagem de referência.');
}
function buildPrompt(post,client){
  const lines=[];
  lines.push(`[ENVIE JUNTO: uma imagem de referência do ${client.name} para o ChatGPT seguir a identidade visual]`);
  lines.push(``);
  lines.push(`Siga EXATAMENTE a identidade visual do post de referência enviado acima (cores, tipografia, estilo gráfico, elementos visuais, layout). Não altere nada da identidade.`);
  lines.push(``);
  lines.push(`---`);
  lines.push(`OBJETIVO:`);
  lines.push(`Criar posts altamente profissionais, com foco em conversão, engajamento e autoridade, mantendo identidade visual consistente e variação criativa infinita.`);
  lines.push(``);
  lines.push(`FORMATOS:`);
  lines.push(`- Feed: 1080x1350`);
  lines.push(`- Story: 1080x1920`);
  lines.push(`- Carrossel: 1080x1350 (múltiplas páginas)`);
  lines.push(``);
  lines.push(`---`);
  lines.push(`REGRAS DE OURO:`);
  lines.push(`- Nunca repetir layout (sempre variar estrutura, composição e estilo)`);
  lines.push(`- Manter identidade visual consistente (cores, tipografia e estilo do post de referência)`);
  lines.push(`- Pensar como uma agência premium`);
  lines.push(`- Criar sempre algo moderno, limpo e visualmente atrativo`);
  lines.push(`- Priorizar clareza e impacto visual`);
  lines.push(`- Evitar poluição visual`);
  lines.push(``);
  lines.push(`---`);
  lines.push(`VARIAÇÃO DE LAYOUT (escolha automaticamente UM diferente a cada criação):`);
  lines.push(`Lateral (imagem + texto) | Centralizado (impacto) | Dividido em blocos | Minimalista`);
  lines.push(`Foco humano (pessoa) | Close (detalhe) | Formas orgânicas | Fundo com bloco de cor`);
  lines.push(`Estilo editorial | Estilo anúncio direto`);
  lines.push(``);
  lines.push(`---`);
  lines.push(`GATILHOS MENTAIS (aplicar automaticamente):`);
  lines.push(`Urgência | Autoridade | Benefício emocional | Prova implícita (resultado) | Facilidade`);
  lines.push(``);
  lines.push(`---`);
  lines.push(`ESTRUTURA DA COPY:`);
  lines.push(`1. Headline forte (impacto ou curiosidade)`);
  lines.push(`2. Subheadline (benefício claro)`);
  lines.push(`3. Complemento (autoridade ou explicação breve)`);
  lines.push(`4. CTA direto (ação clara)`);
  lines.push(``);
  lines.push(`---`);
  lines.push(`DADOS DO POST:`);
  lines.push(``);
  lines.push(`Cliente: ${client.name}${client.instagram?' | '+client.instagram:''}`);
  if(client.nicho) lines.push(`Nicho: ${client.nicho}`);
  lines.push(``);
  if(post.title) lines.push(`TEMA / HEADLINE: ${post.title}`);
  if(post.subtitle) lines.push(`SUBTÍTULO: ${post.subtitle}`);
  if(post.cta) lines.push(`CTA: ${post.cta}`);
  if(post.caption) lines.push(`\nLEGENDA PRONTA:\n${post.caption}`);
  if(post.hashtags) lines.push(`\nHASHTAGS: ${post.hashtags}`);
  if(post.story) lines.push(`\nSTORY IDEA: ${post.story}`);
  lines.push(``);
  lines.push(`---`);
  lines.push(`Crie agora:`);
  lines.push(`1. O post para FEED (1080x1350) com a copy completa`);
  lines.push(`2. O post para STORY (1080x1920) adaptado`);
  lines.push(`Siga todas as regras acima. Seja direto, visual e estratégico.`);
  return lines.join('\n');
}

function renderFilesContent(ds,files){
  const el=document.getElementById('files-content'),df=dayFolder(ds),noRoot=!rootDirHandle;
  let h=`<div class="upload-zone" id="upload-zone"
    ondragover="event.preventDefault();this.classList.add('dragover')"
    ondragleave="this.classList.remove('dragover')"
    ondrop="handleDrop(event,'${ds}')"
    onclick="triggerUpload('${ds}')">
    <p>📂 Soltar arquivos aqui ou clique para selecionar</p>
    <small>JPG/PNG → post/carrossel &nbsp;|&nbsp; MP4/MOV → story &nbsp;|&nbsp; TXT → descrição</small>
    ${noRoot?'<br><small style="color:var(--red)">⚠ Conecte a pasta raiz primeiro (barra lateral)</small>':''}
  </div>
  <input type="file" id="file-input" multiple style="display:none" onchange="handleFileInput(event,'${ds}')">`;
  const empty=!files||((!files.images||!files.images.length)&&!files.video&&!files.txt);
  if(empty){h+=`<div class="no-files">Pasta <code style="color:var(--blue)">${df}/</code> vazia ou não encontrada.</div>`;}
  else{
    if(files.images?.length){
      h+=`<div class="sec-label" style="margin-bottom:8px">IMAGENS (${files.images.length})</div><div id="gallery">`;
      files.images.forEach(img=>{h+=`<div class="gallery-item" onclick="openLB('${img.url}')"><img src="${img.url}" alt="${img.name}"><div class="gal-overlay"><button class="gal-btn" onclick="event.stopPropagation();openLB('${img.url}')">👁</button><button class="gal-btn" onclick="event.stopPropagation();dlBlob('${img.url}','${img.name}')">⬇</button></div></div>`;});
      h+=`</div>`;
    }
    if(files.video){h+=`<div class="video-wrap"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span class="sec-label">STORY / VÍDEO</span><button class="dl-btn" onclick="dlBlob('${files.video.url}','${files.video.name}')">⬇ ${files.video.name}</button></div><video src="${files.video.url}" controls></video></div>`;}
    if(files.txt){h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span class="sec-label">DESCRIÇÃO (descricao.txt)</span><button class="dl-btn" id="dl-txt-btn">⬇ descricao.txt</button></div><div class="post-section"><textarea id="desc-ta" style="min-height:120px">${eh(files.txt.content)}</textarea></div><button class="tb-btn" onclick="saveTxtEdit('${ds}')">💾 Salvar TXT</button>`;}
    const hasD=files.images?.length||files.video;
    if(hasD){h+=`<div class="dl-row" style="margin-top:12px">`;(files.images||[]).forEach(img=>{h+=`<button class="dl-btn" onclick="dlBlob('${img.url}','${img.name}')">⬇ ${img.name}</button>`;});if(files.video)h+=`<button class="dl-btn" onclick="dlBlob('${files.video.url}','${files.video.name}')">⬇ ${files.video.name}</button>`;h+=`</div>`;}
  }
  const post=currentClient?.posts?.[ds];
  if(post)h+=`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px"><button class="tb-btn" onclick="saveSeedTxt('${ds}')">📋 Criar descricao.txt do calendário</button><small style="color:var(--text3);margin-left:8px">Gera TXT com título, legenda e hashtags</small></div>`;
  el.innerHTML=h;
  const dlb=document.getElementById('dl-txt-btn');
  if(dlb&&files?.txt){dlb.onclick=()=>{const ta=document.getElementById('desc-ta');const blob=new Blob([ta?ta.value:files.txt.content],{type:'text/plain;charset=utf-8'});dlBlob(URL.createObjectURL(blob),'descricao.txt');};}
}
function buildDesc(post){let t='';if(post.title)t+=`TÍTULO: ${post.title}\n`;if(post.subtitle)t+=`SUBTÍTULO: ${post.subtitle}\n`;if(post.cta)t+=`\nCTA:\n${post.cta}\n`;if(post.caption)t+=`\nLEGENDA:\n${post.caption}\n`;if(post.hashtags)t+=`\nHASHTAGS:\n${post.hashtags}\n`;if(post.story)t+=`\nSTORY:\n${post.story}\n`;return t;}
async function saveSeedTxt(ds){if(!rootDirHandle){alert('Conecte a pasta raiz primeiro.');return;}const post=currentClient?.posts?.[ds];if(!post)return;await writeTxt(currentClient.id,ds,buildDesc(post));toast('descricao.txt criado!');const f=await readDayFiles(currentClient.id,ds);FILES_CACHE[`${currentClient.id}-${ds}`]=f;currentDayData=f;renderFilesContent(ds,f);}
async function saveTxtEdit(ds){if(!rootDirHandle)return;const ta=document.getElementById('desc-ta');if(!ta)return;await writeTxt(currentClient.id,ds,ta.value);toast('Salvo!');}
function triggerUpload(ds){if(!rootDirHandle){alert('Conecte a pasta raiz primeiro (barra lateral).');return;}document.getElementById('file-input').setAttribute('data-date',ds);document.getElementById('file-input').click();}
async function handleFileInput(ev,ds){const files=Array.from(ev.target.files);if(files.length)await uploadFiles(files,ds);ev.target.value='';}
async function handleDrop(ev,ds){ev.preventDefault();document.getElementById('upload-zone')?.classList.remove('dragover');if(!rootDirHandle){alert('Conecte a pasta raiz primeiro.');return;}const files=Array.from(ev.dataTransfer.files);if(files.length)await uploadFiles(files,ds);}
async function uploadFiles(files,ds){
  if(!rootDirHandle)return;
  let dh=currentDayData?.folderHandle;if(!dh)dh=await ensureDayFolder(currentClient.id,ds);if(!dh){alert('Não foi possível criar a pasta.');return;}
  toast(`Salvando ${files.length} arquivo(s)...`);for(const f of files)await writeFile(dh,f);
  const nf=await readDayFiles(currentClient.id,ds);FILES_CACHE[`${currentClient.id}-${ds}`]=nf;currentDayData=nf;
  renderFilesContent(ds,nf);renderCalendar();toast(`${files.length} arquivo(s) salvo(s)!`);
}
function dlBlob(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.click();}

// ── Client View ──
function openClientView(){
  if(!currentClient)return;
  document.getElementById('cv-name').textContent=currentClient.name;
  document.getElementById('cv-ig').textContent=currentClient.instagram||'';
  const posts=currentClient.posts||{},dates=Object.keys(posts).sort();
  const dn=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],mn=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  let h='';
  for(const ds of dates){
    const p=posts[ds],d=new Date(ds+'T12:00:00'),dl=`${dn[d.getDay()]} ${d.getDate()} de ${mn[d.getMonth()]}`;
    const cache=FILES_CACHE[`${currentClient.id}-${ds}`];
    let imgs='';if(cache?.images?.length)imgs='<div class="cv-imgs">'+cache.images.map(i=>`<img src="${i.url}" alt="${i.name}" onclick="openLB('${i.url}')">`).join('')+'</div>';
    h+=`<div class="cv-card"><div class="cv-date">${dl}</div><div class="cv-title" style="color:${currentClient.color}">${eh(p.title||'Post planejado')}</div>${p.subtitle?`<div class="cv-sub">${eh(p.subtitle)}</div>`:''}${p.caption?`<div class="cv-cap">${eh(p.caption)}</div>`:''}${p.story?`<div class="cv-story">💡 ${eh(p.story)}</div>`:''}${p.hashtags?`<div class="cv-ht">${eh(p.hashtags)}</div>`:''}${imgs}</div>`;
  }
  document.getElementById('cv-cards').innerHTML=h||'<div style="text-align:center;padding:40px;color:var(--text3)">Nenhum post cadastrado.</div>';
  document.getElementById('client-view').classList.add('open');
}
function closeClientView(){document.getElementById('client-view').classList.remove('open');}

// ── Lightbox ──
function openLB(url){document.getElementById('lb-img').src=url;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.getElementById('lb-img').src='';}

// ── Sidebar ──
function renderClientList(f=''){
  const flt=f.toLowerCase();
  const vis=CLIENTS.filter(c=>c.name.toLowerCase().includes(flt)||(c.instagram||'').toLowerCase().includes(flt));
  document.getElementById('client-count').textContent=CLIENTS.length;
  document.getElementById('client-list').innerHTML=vis.map(c=>`<div class="client-item${currentClient?.id===c.id?' active':''}" onclick="selectClient('${c.id}')"><div class="client-dot" style="background:${c.color}"></div><div><div class="client-name">${c.name}</div><div class="client-ig">${c.instagram||''}</div></div></div>`).join('');
}
function filterClients(){renderClientList(document.getElementById('search-input').value);}
function selectClient(id){
  currentClient=CLIENTS.find(c=>c.id===id);if(!currentClient)return;
  document.getElementById('topbar-title').textContent=currentClient.name;
  document.getElementById('month-nav').style.display='';
  document.getElementById('btn-cv').style.display='';
  renderClientList(document.getElementById('search-input').value);
  renderCalendar();
  if(rootDirHandle)refreshFolders();
}
function changeMonth(delta){
  currentMonth+=delta;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}
  renderCalendar();if(rootDirHandle)refreshFolders();
}

// ── Toast ──
function toast(msg){let t=document.getElementById('_t');if(!t){t=document.createElement('div');t.id='_t';t.style.cssText='position:fixed;bottom:22px;right:22px;background:#238636;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:9999;transition:opacity .3s';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._tt);t._tt=setTimeout(()=>t.style.opacity='0',2500);}

// ── Keys ──
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeModal();closeClientView();}});

// ── Init ──
(async()=>{renderClientList();await tryRestoreHandle();updateFolderStatus();})();
</script>
</body>
</html>
